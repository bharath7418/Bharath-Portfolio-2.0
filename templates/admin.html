{% extends 'base.html' %}
{% block content %}





<!--page-title-area start-->
<div class="page-title-area pt-215 pb-30">
    <div class="container">
        <div class="row align-items-center">
            <div class="col-lg-9">
                <div class="page-title-wrapper text-lg-start text-center mb-40">
                    <h2 class="page-title mb-10" style="color: white;">Admin Dashboard</h2>
                    <p style="color: #913BFF; font-weight: 600; font-size: 1.1rem;"><i class="bi bi-shield-lock-fill"></i> Secure Control Session Active</p>
                </div>
            </div>
        </div>
    </div>
</div>
<!--page-title-area end-->

<section class="admin-details pt-40 pb-160">
    <div class="container">
        <div class="row">
            <div class="col-lg-12">
                <div style="background: #130a2a; border: 1px solid #3c1e75; border-radius: 12px; padding: 40px; margin-bottom: 50px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.4);">
                    <h3 style="color: white; margin-bottom: 25px;"><i class="bi bi-folder-plus" style="color: #913BFF;"></i> Add New Project Artifact</h3>
                    
                    <form action="/admin_project_add" method="POST" enctype="multipart/form-data" class="row g-3">
                        <div class="col-md-6">
                            <label for="name" style="color: #cbd5e1; margin-bottom: 5px; font-size: 0.9rem;">Name</label>
                            <input type="text" id="name" name="name" placeholder="Name (Max 20 chars)" maxlength="20" required class="form-control" style="background: #1a103c; color: white; border: 1px solid #3c1e75; padding: 0.65rem 1rem;">
                        </div>
                        <div class="col-md-6">
                            <label for="title" style="color: #cbd5e1; margin-bottom: 5px; font-size: 0.9rem;">Title</label>
                            <input type="text" id="title" name="title" placeholder="Title (Max 20 chars)" maxlength="20" required class="form-control" style="background: #1a103c; color: white; border: 1px solid #3c1e75; padding: 0.65rem 1rem;">
                        </div>

                        <div class="col-md-6">
                            <label for="tools" style="color: #cbd5e1; margin-bottom: 5px; font-size: 0.9rem;">Tools Used</label>
                            <input type="text" id="tools" name="tools" placeholder="Tools Name (e.g. Python, Figma)" required class="form-control" style="background: #1a103c; color: white; border: 1px solid #3c1e75; padding: 0.65rem 1rem;">
                        </div>
                        <div class="col-md-6">
                            <label for="solution" style="color: #cbd5e1; margin-bottom: 5px; font-size: 0.9rem;">Solution</label>
                            <input type="text" id="solution" name="solution" placeholder="Solution (Max 100 chars)" maxlength="100" required class="form-control" style="background: #1a103c; color: white; border: 1px solid #3c1e75; padding: 0.65rem 1rem;">
                        </div>

                        <div class="col-12">
                            <label for="problem_statement" style="color: #cbd5e1; margin-bottom: 5px; font-size: 0.9rem;">Problem Statement</label>
                            <textarea id="problem_statement" name="problem_statement" placeholder="Problem Statement (Max 200 chars)" maxlength="200" required rows="3" class="form-control" style="background: #1a103c; color: white; border: 1px solid #3c1e75; padding: 0.65rem 1rem;"></textarea>
                        </div>

                        <div class="col-12">
                            <label for="description" style="color: #cbd5e1; margin-bottom: 5px; font-size: 0.9rem;">Description</label>
                            <textarea id="description" name="description" placeholder="Description (Max 200 chars)" maxlength="200" required rows="3" class="form-control" style="background: #1a103c; color: white; border: 1px solid #3c1e75; padding: 0.65rem 1rem;"></textarea>
                        </div>

                        <div class="col-12 mt-4">
                            <h5 style="color: #913BFF; margin-bottom: 15px;"><i class="bi bi-images"></i> Project Gallery Images</h5>
                            <div class="row g-2">
                                <div class="col-md-2-4 col-sm-6">
                                    <label class="form-label" style="color: #94a3b8; font-size: 0.8rem;">Image 1</label>
                                    <input type="file" name="file1" class="form-control" accept="image/*" required style="background: #1a103c; color: white; border: 1px solid #3c1e75; font-size: 0.85rem;">
                                </div>
                                <div class="col-md-2-4 col-sm-6">
                                    <label class="form-label" style="color: #94a3b8; font-size: 0.8rem;">Image 2</label>
                                    <input type="file" name="file2" class="form-control" accept="image/*" required style="background: #1a103c; color: white; border: 1px solid #3c1e75; font-size: 0.85rem;">
                                </div>
                                <div class="col-md-2-4 col-sm-6">
                                    <label class="form-label" style="color: #94a3b8; font-size: 0.8rem;">Image 3</label>
                                    <input type="file" name="file3" class="form-control" accept="image/*" required style="background: #1a103c; color: white; border: 1px solid #3c1e75; font-size: 0.85rem;">
                                </div>
                                <div class="col-md-2-4 col-sm-6">
                                    <label class="form-label" style="color: #94a3b8; font-size: 0.8rem;">Image 4</label>
                                    <input type="file" name="file4" class="form-control" accept="image/*" required style="background: #1a103c; color: white; border: 1px solid #3c1e75; font-size: 0.85rem;">
                                </div>
                                <div class="col-md-2-4 col-sm-12">
                                    <label class="form-label" style="color: #94a3b8; font-size: 0.8rem;">Image 5</label>
                                    <input type="file" name="file5" class="form-control" accept="image/*" required style="background: #1a103c; color: white; border: 1px solid #3c1e75; font-size: 0.85rem;">
                                </div>
                            </div>
                        </div>

                        <div class="col-12 mt-4">
                            <h5 style="color: #913BFF; margin-bottom: 15px;"><i class="bi bi-link-45deg"></i> Project & Social Links</h5>
                        </div>
                        <div class="col-md-4">
                            <label for="project_link" style="color: #cbd5e1; margin-bottom: 5px; font-size: 0.9rem;">Project Link</label>
                            <input type="url" id="project_link" name="project_link" placeholder="Live Deployment URL" class="form-control" style="background: #1a103c; color: white; border: 1px solid #3c1e75; padding: 0.65rem 1rem;">
                        </div>
                        <div class="col-md-4">
                            <label for="project_document" style="color: #cbd5e1; margin-bottom: 5px; font-size: 0.9rem;">Project Document</label>
                            <input type="url" id="project_document" name="project_document" placeholder="Project Report Link" class="form-control" style="background: #1a103c; color: white; border: 1px solid #3c1e75; padding: 0.65rem 1rem;">
                        </div>
                        <div class="col-md-4">
                            <label for="linkdin_link" style="color: #cbd5e1; margin-bottom: 5px; font-size: 0.9rem;">LinkdIn Link</label>
                            <input type="url" id="linkdin_link" name="linkdin_link" placeholder="LinkDin URL" class="form-control" style="background: #1a103c; color: white; border: 1px solid #3c1e75; padding: 0.65rem 1rem;">
                        </div>
                        <div class="col-md-4">
                            <label for="instagram_link" style="color: #cbd5e1; margin-bottom: 5px; font-size: 0.9rem;">Instagram Link</label>
                            <input type="url" id="instagram_link" name="instagram_link" placeholder="Instagram URL" class="form-control" style="background: #1a103c; color: white; border: 1px solid #3c1e75; padding: 0.65rem 1rem;">
                        </div>
                        <div class="col-md-4">
                            <label for="youtube_link" style="color: #cbd5e1; margin-bottom: 5px; font-size: 0.9rem;">YouTube Link</label>
                            <input type="url" id="youtube_link" name="youtube_link" placeholder="YouTube Video URL" class="form-control" style="background: #1a103c; color: white; border: 1px solid #3c1e75; padding: 0.65rem 1rem;">
                        </div>
                        <div class="col-md-4">
                            <label for="feedback" style="color: #cbd5e1; margin-bottom: 5px; font-size: 0.9rem;">Feedback Link</label>
                            <input type="text" id="feedback" name="feedback" placeholder="Feedback/Review notes" class="form-control" style="background: #1a103c; color: white; border: 1px solid #3c1e75; padding: 0.65rem 1rem;">
                        </div>

                        <div class="col-md-4">
                            <label for="client" style="color: #cbd5e1; margin-bottom: 5px; font-size: 0.9rem;">Client</label>
                            <input type="text" id="client" name="client" placeholder="Client Details" class="form-control" style="background: #1a103c; color: white; border: 1px solid #3c1e75; padding: 0.65rem 1rem;">
                        </div>


                        <div class="col-md-4">
                            <label for="user count" style="color: #cbd5e1; margin-bottom: 5px; font-size: 0.9rem;">User Count</label>
                            <input type="text" id="user" name="user" placeholder="User Count" class="form-control" style="background: #1a103c; color: white; border: 1px solid #3c1e75; padding: 0.65rem 1rem;">
                        </div>


                        <div class="col-md-4">
                            <label for="Date" style="color: #cbd5e1; margin-bottom: 5px; font-size: 0.9rem;">Date</label>
                            <input type="text" id="date" name="date" placeholder="Date" class="form-control" style="background: #1a103c; color: white; border: 1px solid #3c1e75; padding: 0.65rem 1rem;">
                        </div>
                        
                        <div class="col-12 mt-4">
                            <button type="submit" class="btn btn-primary" style="background: #913BFF; border: none; padding: 0.75rem 2rem; font-weight: 500;"><i class="bi bi-cloud-upload"></i> Upload Project</button>
                        </div>
                    </form>
                </div>

                <style>
                    @media (min-width: 768px) {
                        .col-md-2-4 { float: left; width: 20%; position: relative; min-height: 1px; padding-right: 12px; padding-left: 12px; }
                    }
                </style>

                </div>
        </div>
    </div>
</section>

{% endblock %}
