{% extends 'base.html' %}
{% block content %}

<!--page-title-area start-->
<div class="page-title-area pt-215 pb-30">
    <div class="container">
        <div class="row align-items-center">
            <div class="col-lg-9">
                <div class="page-title-wrapper text-lg-start text-center mb-40">
                    <h2 class="page-title mb-10" style="color: white;">Admin Dashboard</h2>
                    <p style="color: #913BFF; font-weight: 600; font-size: 1.1rem;"><i class="bi bi-shield-lock-fill"></i> Secure Control Session Active</p>
                </div>
            </div>
        </div>
    </div>
</div>
<!--page-title-area end-->

<section class="admin-details pt-40 pb-160">
    <div class="container">
        <div class="row">
            <div class="col-lg-12">
                <div style="background: #130a2a; border: 1px solid #3c1e75; border-radius: 12px; padding: 40px; margin-bottom: 50px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.4);">
                    <h3 style="color: white; margin-bottom: 25px;"><i class="bi bi-folder-plus" style="color: #913BFF;"></i> Add New Project Artifact</h3>
                    
                    <form action="/admin_project_add" method="POST" enctype="multipart/form-data" class="row g-3">
                        
                        <!-- Core Details Section -->
                        <div class="col-md-6">
                            <label for="name" style="color: #cbd5e1; margin-bottom: 5px; font-size: 0.9rem;"><i class="bi bi-tag-fill" style="color: #913BFF;"></i> Name</label>
                            <input type="text" id="name" name="name" placeholder="Name (Max 20 chars)" maxlength="20" required class="form-control" style="background: #1a103c; color: white; border: 1px solid #3c1e75; padding: 0.65rem 1rem;">
                        </div>
                        <div class="col-md-6">
                            <label for="title" style="color: #cbd5e1; margin-bottom: 5px; font-size: 0.9rem;"><i class="bi bi-type-h1" style="color: #913BFF;"></i> Title</label>
                            <input type="text" id="title" name="title" placeholder="Title (Max 20 chars)" required class="form-control" style="background: #1a103c; color: white; border: 1px solid #3c1e75; padding: 0.65rem 1rem;">
                        </div>

                        <div class="col-12">
                            <label for="problem_statement" style="color: #cbd5e1; margin-bottom: 5px; font-size: 0.9rem;"><i class="bi bi-exclamation-octagon-fill" style="color: #913BFF;"></i> Problem Statement</label>
                            <textarea id="problem_statement" name="problem_statement" placeholder="Problem Statement (Max 200 chars)" required rows="4" class="form-control" style="background: #1a103c; color: white; border: 1px solid #3c1e75; padding: 0.65rem 1rem;"></textarea>
                        </div>
                        
                        <div class="col-12">
                            <label for="description" style="color: #cbd5e1; margin-bottom: 5px; font-size: 0.9rem;"><i class="bi bi-file-earmark-text-fill" style="color: #913BFF;"></i> Description</label>
                            <textarea id="description" name="description" placeholder="Description (Max 200 chars)" required rows="3" class="form-control" style="background: #1a103c; color: white; border: 1px solid #3c1e75; padding: 0.65rem 1rem;"></textarea>
                        </div>

                        <div class="col-md-6">
                            <label for="tools" style="color: #cbd5e1; margin-bottom: 5px; font-size: 0.9rem;"><i class="bi bi-tools" style="color: #913BFF;"></i> Tools Used</label>
                            <input type="text" id="tools" name="tools" placeholder="Tools Name (e.g. Python, Figma)" required class="form-control" style="background: #1a103c; color: white; border: 1px solid #3c1e75; padding: 0.65rem 1rem;">
                        </div>

                        <div class="col-md-6">
                            <label for="solution" style="color: #cbd5e1; margin-bottom: 5px; font-size: 0.9rem;"><i class="bi bi-check-circle-fill" style="color: #913BFF;"></i> Solution</label>
                            <textarea id="solution" name="solution" placeholder="Solution Details (Max 200 chars)" required rows="1" class="form-control" style="background: #1a103c; color: white; border: 1px solid #3c1e75; padding: 0.65rem 1rem; height: 46px; resize: none;"></textarea>
                        </div>

                        <!-- Gallery Images Section -->
                        <div class="col-12 mt-4">
                            <h5 style="color: #913BFF; margin-bottom: 15px;"><i class="bi bi-images"></i> Project Gallery Images</h5>
                            <div class="row g-2">
                                <div class="col-md-2-4 col-sm-6">
                                    <label class="form-label" style="color: #94a3b8; font-size: 0.8rem;"><i class="bi bi-image"></i> Image 1</label>
                                    <input type="file" name="file1" class="form-control" accept="image/*" required style="background: #1a103c; color: white; border: 1px solid #3c1e75; font-size: 0.85rem;">
                                </div>
                                <div class="col-md-2-4 col-sm-6">
                                    <label class="form-label" style="color: #94a3b8; font-size: 0.8rem;"><i class="bi bi-image"></i> Image 2</label>
                                    <input type="file" name="file2" class="form-control" accept="image/*" required style="background: #1a103c; color: white; border: 1px solid #3c1e75; font-size: 0.85rem;">
                                </div>
                                <div class="col-md-2-4 col-sm-6">
                                    <label class="form-label" style="color: #94a3b8; font-size: 0.8rem;"><i class="bi bi-image"></i> Image 3</label>
                                    <input type="file" name="file3" class="form-control" accept="image/*" required style="background: #1a103c; color: white; border: 1px solid #3c1e75; font-size: 0.85rem;">
                                </div>
                                <div class="col-md-2-4 col-sm-6">
                                    <label class="form-label" style="color: #94a3b8; font-size: 0.8rem;"><i class="bi bi-image"></i> Image 4</label>
                                    <input type="file" name="file4" class="form-control" accept="image/*" required style="background: #1a103c; color: white; border: 1px solid #3c1e75; font-size: 0.85rem;">
                                </div>
                                <div class="col-md-2-4 col-sm-12">
                                    <label class="form-label" style="color: #94a3b8; font-size: 0.8rem;"><i class="bi bi-image"></i> Image 5</label>
                                    <input type="file" name="file5" class="form-control" accept="image/*" required style="background: #1a103c; color: white; border: 1px solid #3c1e75; font-size: 0.85rem;">
                                </div>
                            </div>
                        </div>

                        <!-- Links & Socials Section -->
                        <div class="col-12 mt-4">
                            <h5 style="color: #913BFF; margin-bottom: 15px;"><i class="bi bi-link-45deg"></i> Project & Social Links</h5>
                        </div>
                        <div class="col-md-4">
                            <label for="project_link" style="color: #cbd5e1; margin-bottom: 5px; font-size: 0.9rem;"><i class="bi bi-globe" style="color: #913BFF;"></i> Project Link</label>
                            <input type="url" id="project_link" name="project_link" placeholder="https://live-deployment.com" class="form-control" style="background: #1a103c; color: white; border: 1px solid #3c1e75; padding: 0.65rem 1rem;">
                        </div>
                        <div class="col-md-4">
                            <label for="project_document" style="color: #cbd5e1; margin-bottom: 5px; font-size: 0.9rem;"><i class="bi bi-file-earmark-pdf-fill" style="color: #913BFF;"></i> Project Document</label>
                            <input type="url" id="project_document" name="project_document" placeholder="https://report-link.com" class="form-control" style="background: #1a103c; color: white; border: 1px solid #3c1e75; padding: 0.65rem 1rem;">
                        </div>
                        <div class="col-md-4">
                            <label for="linkedin_link" style="color: #cbd5e1; margin-bottom: 5px; font-size: 0.9rem;"><i class="bi bi-linkedin" style="color: #0a66c2;"></i> LinkedIn Link</label>
                            <input type="url" id="linkedin_link" name="linkedin_link" placeholder="https://linkedin.com/in/..." class="form-control" style="background: #1a103c; color: white; border: 1px solid #3c1e75; padding: 0.65rem 1rem;">
                        </div>
                        <div class="col-md-4">
                            <label for="instagram_link" style="color: #cbd5e1; margin-bottom: 5px; font-size: 0.9rem;"><i class="bi bi-instagram" style="color: #e1306c;"></i> Instagram Link</label>
                            <input type="url" id="instagram_link" name="instagram_link" placeholder="https://instagram.com/..." class="form-control" style="background: #1a103c; color: white; border: 1px solid #3c1e75; padding: 0.65rem 1rem;">
                        </div>
                        <div class="col-md-4">
                            <label for="youtube_link" style="color: #cbd5e1; margin-bottom: 5px; font-size: 0.9rem;"><i class="bi bi-youtube" style="color: #ff0000;"></i> YouTube Link</label>
                            <input type="url" id="youtube_link" name="youtube_link" placeholder="https://youtube.com/watch?v=..." class="form-control" style="background: #1a103c; color: white; border: 1px solid #3c1e75; padding: 0.65rem 1rem;">
                        </div>
                        <div class="col-md-4">
                            <label for="feedback" style="color: #cbd5e1; margin-bottom: 5px; font-size: 0.9rem;"><i class="bi bi-chat-left-heart-fill" style="color: #913BFF;"></i> Feedback Link</label>
                            <input type="text" id="feedback" name="feedback" placeholder="Feedback/Review notes" class="form-control" style="background: #1a103c; color: white; border: 1px solid #3c1e75; padding: 0.65rem 1rem;">
                        </div>

                        <!-- Metadata Section -->
                        <div class="col-md-4">
                            <label for="client" style="color: #cbd5e1; margin-bottom: 5px; font-size: 0.9rem;"><i class="bi bi-person-bounding-box" style="color: #913BFF;"></i> Client</label>
                            <input type="text" id="client" name="client" placeholder="Client Details" class="form-control" style="background: #1a103c; color: white; border: 1px solid #3c1e75; padding: 0.65rem 1rem;">
                        </div>
                        <div class="col-md-4">
                            <label for="user" style="color: #cbd5e1; margin-bottom: 5px; font-size: 0.9rem;"><i class="bi bi-people-fill" style="color: #913BFF;"></i> User Count</label>
                            <input type="number" id="user" name="user" placeholder="User Count" class="form-control" style="background: #1a103c; color: white; border: 1px solid #3c1e75; padding: 0.65rem 1rem;">
                        </div>
                        <div class="col-md-4">
                            <label for="date" style="color: #cbd5e1; margin-bottom: 5px; font-size: 0.9rem;"><i class="bi bi-calendar-event-fill" style="color: #913BFF;"></i> Date</label>
                            <input type="date" id="date" name="date" class="form-control" style="background: #1a103c; color: white; border: 1px solid #3c1e75; padding: 0.65rem 1rem;">
                        </div>
                        
                        <!-- Submit Button -->
                        <div class="col-12 mt-4">
                            <button type="submit" class="btn btn-primary" style="background: #913BFF; border: none; padding: 0.75rem 2rem; font-weight: 500;"><i class="bi bi-cloud-upload"></i> Upload Project</button>
                        </div>
                    </form>
                </div>

                <style>
                    @media (min-width: 768px) {
                        .col-md-2-4 { float: left; width: 20%; position: relative; min-height: 1px; padding-right: 12px; padding-left: 12px; }
                    }
                    /* Customizing native browser date icon colors to match the layout */
                    input[type="date"]::-webkit-calendar-picker-indicator {
                        filter: invert(34%) sepia(88%) saturate(3522%) hue-rotate(248deg) brightness(101%) contrast(101%);
                    }
                </style>

            </div>
        </div>
    </div>
</section>

{% endblock %}
