{% extends 'base.html' %}
{% block content %}

<!--page-title-area start-->
<div class="page-title-area pt-215 pb-30">
    <div class="container">
        <div class="row align-items-center">
            <div class="col-lg-9">
                <div class="page-title-wrapper text-lg-start text-center mb-40 wow fadeInDown">
                    <h2 class="page-title mb-10" style="color: white;">Admin Portal</h2>
                    <p style="color: #94a3b8; font-size: 1.1rem;">Authenticate securely to manage portfolio structures.</p>
                </div>
            </div>
        </div>
    </div>
</div>
<!--page-title-area end-->

<section class="login-details pt-40 pb-160">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-5 wow fadeInUp" data-wow-delay="0.2s">
                <div class="card">
                    <h3 style="text-align:center; margin-bottom:2rem; color: white;"><i class="bi bi-shield-lock-fill" style="color: var(--primary-color);"></i> Access Validation</h3>
                    <form method="POST">
                        <div class="mb-3">
                            <label for="username">Username</label>
                            <input type="text" id="username" name="username" placeholder="Enter administrative username" required class="form-control">
                        </div>
                        <div class="mb-4">
                            <label for="password">Password</label>
                            <input type="password" id="password" name="password" placeholder="Enter security passphrase" required class="form-control">
                        </div>
                        <button type="submit" class="btn w-100">Validate Credentials</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>

{% endblock %}
