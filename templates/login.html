{% extends 'base.html' %}
{% block content %}

<!--page-title-area start-->
<div class="page-title-area pt-215 pb-30">
    <div class="container">
        <div class="row align-items-center">
            <div class="col-lg-9">
                <div class="page-title-wrapper text-lg-start text-center mb-40">
                    <h2 class="page-title mb-10" style="color: white;">Admin Portal</h2>
                    <p style="color: #94a3b8; font-size: 1.1rem;">Authenticate securely to manage portfolio structures.</p>
                </div>
            </div>
        </div>
    </div>
</div>
<!--page-title-area end-->

<section class="login-details pt-40 pb-160">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-5">
                <div class="card" style="background: #130a2a; border: 1px solid #3c1e75; border-radius: 12px; padding: 40px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.4);">
                    <h3 style="text-align:center; margin-bottom:2rem; color: white;">Administrative Validation</h3>
                    <form method="POST">
                        <div class="mb-3">
                            <label for="username">Username</label>
                            <input type="text" id="username" name="username" required class="form-control" style="background: #1a103c; color: white; border: 1px solid #3c1e75; padding: 0.65rem 1rem;">
                        </div>
                        <div class="mb-4">
                            <label for="password">Password</label>
                            <input type="password" id="password" name="password" required class="form-control" style="background: #1a103c; color: white; border: 1px solid #3c1e75; padding: 0.65rem 1rem;">
                        </div>
                        <button type="submit" class="btn w-100" style="padding: 0.75rem;">Validate Credentials</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>

{% endblock %}
